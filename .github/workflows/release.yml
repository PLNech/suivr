name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Automated release for `${{ github.ref_name }}`.

            **suivr** is a friendly fork of [polr](https://github.com/cydrobolt/polr)
            adding a link-management API (`list` / `rename` / `update` / `toggle` / `delete`).
            See the [API docs](docs/developer-guide/api.md) for the new endpoints.
